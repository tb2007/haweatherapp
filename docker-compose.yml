services:
  api:
    build: ./api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HA_BASE_URL: ${HA_BASE_URL}
      HA_TOKEN: ${HA_TOKEN}
      APP_USERNAME: ${APP_USERNAME}
      APP_PASSWORD: ${APP_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      RTSP_URL: ${RTSP_URL:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    networks:
      - internal
    expose:
      - "3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - internal
    depends_on:
      - api
      - go2rtc

  go2rtc:
    image: alexxit/go2rtc
    restart: unless-stopped
    environment:
      RTSP_URL: ${RTSP_URL:-}
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml:ro
    networks:
      - internal
    expose:
      - "1984"

networks:
  internal:
    driver: bridge
